version: "3.9"

services:
  mongo:
    image: mongo:7.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: test_database
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "19006:19006"
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend

volumes:
  mongo_data:
